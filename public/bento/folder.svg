<svg width="400" height="360" viewBox="0 0 400 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8A060"></stop>
      <stop offset="100%" stop-color="#B54B00"></stop>
    </linearGradient>
    <linearGradient id="frontGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C86A1A"></stop>
      <stop offset="100%" stop-color="#7A3300"></stop>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"></stop>
      <stop offset="100%" stop-color="white" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="folderShadow" x="-15%" y="-5%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#5C2800" flood-opacity="0.28"></feDropShadow>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#5C2800" flood-opacity="0.2"></feDropShadow>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <ellipse cx="200" cy="340" rx="160" ry="28" fill="#B54B00" opacity="0.2" filter="url(#glow)"></ellipse>

  <g filter="url(#folderShadow)">
    
    <rect x="30" y="80" width="340" height="220" rx="22" fill="url(#backGrad)"></rect>
    
    <rect x="30" y="54" width="108" height="46" rx="14" fill="url(#backGrad)"></rect>
    <rect x="30" y="80" width="108" height="20" fill="url(#backGrad)"></rect>

    
    <path d="M30 195 C80 178, 130 200, 180 188 C230 176, 280 196, 370 182 L370 295 Q370 317 348 317 L52 317 Q30 317 30 295 Z" fill="url(#frontGrad)"></path>

    
    <path d="M30 195 C80 178, 130 200, 180 188 C230 176, 280 196, 370 182" stroke="white" stroke-opacity="0.35" stroke-width="2.5" fill="none"></path>

    
    <rect x="30" y="200" width="340" height="117" rx="0" fill="url(#frontGrad)"></rect>
    <rect x="30" y="295" width="340" height="22" rx="0" fill="url(#frontGrad)"></rect>
    <rect x="30" y="295" width="340" height="22" rx="22" fill="url(#frontGrad)" style="transform-origin:bottom;"></rect>
    
    <path d="M30 295 L370 295 L370 317 Q370 317 348 317 L52 317 Q30 317 30 295 Z" fill="url(#frontGrad)"></path>

    
    <path d="M30 200 C80 183, 130 205, 180 193 C230 181, 280 201, 370 187 L370 232 Q320 232 280 232 C230 232 180 232 30 232 Z" fill="url(#shineGrad)"></path>
  </g>
</svg>